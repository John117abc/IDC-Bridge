_base: "base.yaml"

# ---- 环境配置 ----
env:
  num_worlds: 75
  max_agents: 1
  epochs: 3500
  seed: 5
  device: "cuda"

# ---- 路径/保存 ----
paths:
  file_dir: "/workspace/data"
  model_path: "/workspace/data/checkpoints/20260606/idc-waymo-v1.0_examples_131203_episode=2660.pth"
  save_freq: 5
  load_model: true

# ---- 可视化/GIF 配置（训练默认关闭） ----
viz:
  gif_enabled: false
  gif_fps: 15
  gif_record_interval: 2
  gif_max_worlds: 10
  gif_save_dir: "/workspace/data/gifs"
  gif_world_selection: "first"     # "first" | "random"
  gif_view_mode: "agent_pov"     # "bird_2d" | "bird_3d" | "agent_pov"
  gif_zoom_radius: 70
