_base: "base.yaml"

# ---- 环境配置 ----
env:
  num_worlds: 30
  max_agents: 1
  epochs: 1
  seed: null  # 不固定种子，每次评估随机采样不同世界
  device: "cuda"

# ---- 路径 ----
paths:
  file_dir: "/workspace/data"
  save_freq: 1

# ---- 可视化/GIF 配置（评估默认开启） ----
viz:
  gif_enabled: true
  gif_fps: 15
  gif_record_interval: 2
  gif_max_worlds: 64
  gif_save_dir: "/workspace/data/gifs"
  gif_world_selection: "random"    # "first" | "random"
  gif_view_mode: "bird_3d"     # "bird_2d" | "bird_3d" | "agent_pov"
  gif_zoom_radius: 70